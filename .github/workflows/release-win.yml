name: Release (Windows)

# v で始まるタグ (例 v1.0.0) を push したときだけ起動。
# 通常の push では何もしない (CI 負荷最小)。
on:
  push:
    tags:
      - 'v*'
  # 手動でも試せるようにしておく (Actions 画面の "Run workflow")
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン (省略時はタグ名 / git describe)'
        required: false
        default: ''

permissions:
  contents: write   # GitHub Releases へのアップロードに必要

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      # vcpkg のビルド成果物を GitHub Actions キャッシュに保存して 2 回目以降を高速化
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vcpkg の x-gha バイナリキャッシュに必要な環境変数を export
      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # MSVC 開発環境 (cl / link) を有効化。 preset が CMAKE_C_COMPILER=cl を使うため必須。
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      # windows-latest にプリインストールされた vcpkg を使う
      - name: Set VCPKG_ROOT
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure (cmake --preset x64-windows)
        shell: pwsh
        run: cmake --preset x64-windows

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build/x64-windows --config Release

      - name: Package
        id: pkg
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = "${{ github.ref_name }}" }
          pwsh tools/package_win.ps1 -Version $ver -Config Release

      - name: Upload build artifact (常に保存)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.zip }}

      # タグ push 時のみ GitHub Releases に公開
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true
